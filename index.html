<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carla.agenciayaar – Tutorial</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link href="https://api.fontshare.com/v2/css?f[]=nunito@400,500,600,700,800,900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: none; }
    body {
      font-family: 'Nunito', sans-serif;
      background-color: #18111a;
      color: #f0e6f6;
      min-height: 100dvh;
      line-height: 1.6;
    }
    .banner-topo { width: 100%; display: block; line-height: 0; }
    .banner-topo img { width: 100%; height: auto; display: block; object-fit: cover; }
    .faixa-gratis { background: rgb(20, 83, 45); padding: .65rem 1rem; text-align: center; }
    .faixa-gratis .linha1 { display: block; font-size: 1rem; font-weight: 900; color: #4ade80; letter-spacing: .03em; line-height: 1.3; }
    .faixa-gratis .linha2 { display: block; font-size: .85rem; font-weight: 700; color: #4ade80; letter-spacing: .01em; line-height: 1.4; margin-top: .15rem; }

    .escolha-celular {
      max-width: 700px;
      margin: 2.5rem auto 3rem;
      padding: 0 1rem;
      text-align: center;
    }
    .escolha-celular .pergunta {
      font-size: 1.2rem;
      font-weight: 800;
      color: #f0e6f6;
      margin-bottom: 1.8rem;
      line-height: 1.5;
    }
    .botoes-celular {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }
    .btn-celular {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 148px;
      height: 52px;
      background: #e91e8c;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background .18s, transform .12s;
      letter-spacing: .02em;
      white-space: nowrap;
    }
    .btn-celular:hover { background: #c2177a; transform: translateY(-2px); }
    .ou-separador {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 52px;
      font-size: .95rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }

    .site-footer {
      text-align: center;
      padding: 1.5rem 1rem 2.5rem;
      font-size: .85rem;
      color: #b090c8;
      border-top: 1px solid rgba(90, 40, 110, 0.4);
    }
    .site-footer strong { color: #e0a0ff; }

    @media (max-width: 400px) {
      .btn-celular { width: 130px; height: 48px; font-size: .9rem; }
      .ou-separador { width: 36px; }
    }
  </style>
</head>
<body>

  <div class="banner-topo">
    <img src="assets/img/banner-topo.jpg" alt="Carla.agenciayaar – Tutorial oficial" width="1200" height="400" loading="eager" />
  </div>

  <div class="faixa-gratis">
    <span class="linha1">✅ 100% GRÁTIS</span>
    <span class="linha2">Cadastro, download e uso são totalmente gratuitos!</span>
  </div>

  <section class="escolha-celular" aria-label="Escolha o modelo do seu celular">
    <p class="pergunta">1) Qual modelo do seu celular?</p>
    <div class="botoes-celular">
      <a class="btn-celular" href="pagina2">🤖 ANDROID</a>
      <span class="ou-separador">ou</span>
      <a class="btn-celular" href="pagina3">🍎 IPHONE</a>
    </div>
  </section>

  <footer class="site-footer">
    <p><strong>Carla.appgringo</strong> direitos reservados 2026</p>
  </footer>

</body>
</html>
